<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>RB 掃地僧籌碼戰情室</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0c0c0c; color: #e0e0e0; font-family: 'Segoe UI', Microsoft JhengHei, sans-serif; }
        .card { background-color: #1a1a1a; border: 1px solid #333; margin-bottom: 20px; }
        .status-pass { color: #00ff00; font-weight: bold; }
        .status-fail { color: #ff4444; font-weight: bold; }
        .update-time { font-size: 0.8em; color: #888; }
        .table-dark { background-color: #1a1a1a; }
    </style>
</head>
<body>
<div class="container py-5">
    <h1 class="mb-4 text-center" style="color: #f1c40f;">📊 RB 掃地僧籌碼戰情室</h1>
    
    <div class="row">
        {% for stock in stocks %}
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="card-title">{{ stock.id }} {{ stock.name }}</h3>
                    <hr style="border-color: #444;">
                    <p class="fs-5">即時狀態：
                        <span class="{{ 'status-pass' if '✅' in stock.status else 'status-fail' }}">
                            {{ stock.status }}
                        </span>
                    </p>
                    <p class="fs-6">主力趨勢：<span class="text-warning">{{ stock.trend }}</span></p>
                    <div class="update-time text-end">最後更新：{{ stock.last_update }}</div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
