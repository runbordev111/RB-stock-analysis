<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RB 籌碼戰情室 - 靜態 Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .led-pill{ display:inline-flex; align-items:center; gap:8px; padding:8px 14px; border-radius:999px; background:#1e1e1e; border:1px solid #3a3a3a; color:#cfcfcf; font-weight:700; font-size:0.95rem; }
    .led-pill.off{ opacity:.55; }
    .led-pill.off .led-dot{ background:#555; }
    .led-dot{ width:10px; height:10px; border-radius:50%; background:#666; }
    .led-pill.on .led-dot{ background:#22c55e; box-shadow:0 0 10px rgba(34,197,94,.9); }
    .led-pill.danger .led-dot{ background:#ef4444; box-shadow:0 0 10px rgba(239,68,68,.9); }
    .led-group{ display:flex; flex-wrap:wrap; gap:10px; }
    .broker-chip{ display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:8px; vertical-align:middle; }
    body{ background:#0c0c0c; color:#e0e0e0; font-family:'Segoe UI',Microsoft JhengHei,sans-serif; }
    .card{ background:#1a1a1a; border:1px solid #333; margin-bottom:20px; border-radius:12px; }
    .status-pass{ color:#2ecc71; font-weight:bold; }
    .status-fail{ color:#e74c3c; font-weight:bold; }
    .status-warn{ color:#f1c40f; font-weight:bold; }
    .update-time{ font-size:0.85em; color:#888; }
    .table-dark{ --bs-table-bg:#1a1a1a; font-size:0.85em; }
    .table-dark th{ color:#f1c40f; }
    .buy-row{ color:#ff4444; font-weight:bold; }
    .sell-row{ color:#66b2ff; font-weight:bold; }
    .metric-card{ text-align:center; padding:15px; border-radius:8px; background:#252525; }
    .metric-value{ font-size:1.8rem; font-weight:bold; color:#f1c40f; }
    .metric-label{ font-size:0.8rem; color:#aaa; }
    .tag-pill{ display:inline-block; padding:4px 10px; border-radius:999px; background:#2b2b2b; color:#ddd; font-size:0.8rem; margin-right:6px; margin-top:6px; border:1px solid #444; }
    .chart-container{ position:relative; height:350px; width:100%; margin-bottom:20px; }
    .chart-container-bar{ position:relative; height:420px; width:100%; margin-bottom:20px; }
    .chart-container-mini{ position:relative; height:240px; width:100%; margin-bottom:20px; }
    .cost-zone-container{ background:#0f0f0f; border-radius:8px; padding:15px; border-left:4px solid #f1c40f; margin-bottom:20px; }
    .cost-bar-track{ position:relative; height:6px; background:#333; border-radius:4px; margin-top:6px; }
    .cost-bar-range{ position:absolute; top:0; height:6px; background:linear-gradient(90deg,#f97316,#22c55e); border-radius:4px; }
    .cost-bar-close{ position:absolute; top:-3px; width:2px; height:12px; background:#e5e7eb; }
    .cost-bar-label{ font-size:0.8rem; color:#f9fafb; margin-top:4px; }
    .kpi-hero{ padding:16px; border-radius:10px; border:1px solid #333; text-align:center; }
    .kpi-hero .kpi-title{ font-size:0.85rem; color:#aaa; }
    .kpi-hero .kpi-num{ font-size:1.8rem; font-weight:bold; }
    .kpi-hero.pos .kpi-num{ color:#2ecc71; }
    .kpi-hero.neg .kpi-num{ color:#e74c3c; }
    .kpi-hero .kpi-sub{ font-size:0.8rem; color:#888; }
    .text-info-dash{ color:#5bc0de; }
    .dashboard-subtitle{ color:#9ca3af; font-size:0.95rem; }
    .org-foreign{ color:#c084fc; font-weight:600; }
    .org-local{ color:#84cc16; font-weight:600; }
  </style>
</head>
<body>
<div class="container py-5">
  <h1 class="mb-2 text-center" style="color:#f1c40f;" id="dashboardTitle">📊 RUNBOR 籌碼戰情室</h1>
  <div class="text-center mb-2">
    <span class="badge bg-secondary" id="versionBadge">版本：載入中…</span>
  </div>

  <ul class="nav nav-tabs mb-3" id="rbTabs" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="tab-dashboard" data-bs-toggle="tab"
              data-bs-target="#panel-dashboard" type="button" role="tab">
        分數儀表板
      </button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="tab-phase1" data-bs-toggle="tab"
              data-bs-target="#panel-phase1" type="button" role="tab">
        報酬分析
      </button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="tab-phase3" data-bs-toggle="tab"
              data-bs-target="#panel-phase3" type="button" role="tab">
        勝率評估表
      </button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="tab-archetype" data-bs-toggle="tab"
              data-bs-target="#panel-archetype" type="button" role="tab">
        券商原型
      </button>
    </li>
  </ul>

  <div class="tab-content" id="rbTabsContent">
    <div class="tab-pane fade show active" id="panel-dashboard" role="tabpanel" aria-labelledby="tab-dashboard">
      <div class="row justify-content-center mb-3">
        <div class="col-lg-10">
          <label class="mb-0 fs-3 fw-bold text-white">切換股票：</label>
          <select id="stockSelect" class="form-select form-select-lg w-auto bg-dark text-white border-secondary" style="font-size:1.75rem;">
            <option value="">載入中…</option>
          </select>
        </div>
      </div>

      <div id="content"></div>
      <div id="loading" class="text-center text-muted py-5">選擇股票後將載入數據…</div>
    </div>

    <div class="tab-pane fade" id="panel-phase1" role="tabpanel" aria-labelledby="tab-phase1">
      <iframe src="data/signal_vs_returns_report.html"
              style="width:100%; height:80vh; border:none; margin-top:16px;"
              title="Phase 1 Signal vs Returns Report"></iframe>
    </div>

    <div class="tab-pane fade" id="panel-phase3" role="tabpanel" aria-labelledby="tab-phase3">
      <div class="d-flex flex-wrap align-items-center gap-2 mt-3">
        <div class="text-muted">選擇 horizon：</div>
        <div class="btn-group" role="group" aria-label="Phase 3 horizon">
          <button type="button" class="btn btn-sm btn-outline-warning" data-phase3-horizon="5">ret_5d</button>
          <button type="button" class="btn btn-sm btn-outline-warning" data-phase3-horizon="10">ret_10d</button>
          <button type="button" class="btn btn-sm btn-outline-warning active" data-phase3-horizon="20">ret_20d</button>
        </div>
      </div>
      <iframe id="phase3Frame"
              src="data/ml_winrate_report_ret20d.html"
              style="width:100%; height:80vh; border:none; margin-top:12px;"
              title="Phase 3 ML Winrate Report"></iframe>
      <div class="text-muted mt-2" style="font-size:0.9rem;">
        若顯示空白：請先在本機執行 <code>bat/7_phase3_ml_winrate.bat</code> 產生 <code>data/ml_winrate_report_ret*.html</code>，並推送到 GitHub Pages。
      </div>
    </div>

    <div class="tab-pane fade" id="panel-archetype" role="tabpanel" aria-labelledby="tab-archetype">
      <div id="archetypeContent" class="mt-3 text-muted">
        請先在 Dashboard 分頁選擇股票，這裡會顯示 Top6 券商的 Broker archetype 分析。
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function(){
  const DATA_BASE = 'data';
  let manifest = { stock_ids: [], stocks: [] };
  let charts = { whale: null, radar: null, breadth: null, coherence: null, tornadoBuy: null, tornadoSell: null };
  function destroyCharts(){
    ['whale','radar','breadth','coherence','tornadoBuy','tornadoSell'].forEach(function(k){ if (charts[k]) { try { charts[k].destroy(); } catch(e){} charts[k]=null; } });
  }

  function el(id){ return document.getElementById(id); }
  function buildFlags(signals){
    const f5 = parseFloat(signals.foreign_net_5d || 0) || 0;
    const l5 = parseFloat(signals.local_net_5d || 0) || 0;
    const buy5 = parseFloat(signals.buy_count_5d || 0) || 0;
    const sell5 = parseFloat(signals.sell_count_5d || 0) || 0;
    const score_u = parseFloat(signals.score_unified || signals.score || 0) || 0;
    const trend = String(signals.trend || '');
    return {
      fb_diverge: ((f5>0&&l5<0)||(f5<0&&l5>0)) ? 1 : 0,
      breadth_expand: (buy5-sell5)>0 ? 1 : 0,
      net_sell_dominate: (trend.indexOf('偏空')>=0 || score_u<=30) ? 1 : 0,
      strength_high: score_u>=75 ? 1 : 0
    };
  }
  function msZh(ms){
    const m = { ACCUMULATION:'吸籌/佈局期', MARKUP:'推升/趨勢延續', FADING:'退潮警戒', DISTRIBUTION:'派發警戒' };
    return m[ms] || '觀察中';
  }
  function geoTagZh(tag){
    if (!tag) return '';
    if (tag.indexOf('geo_na')>=0) return '暫無地緣資料';
    if (tag.indexOf('baseline_all')>=0) return '以全市場作為基準';
    return tag;
  }
  function reasonZh(code){
    const map = {
      dist_risk_on: '派發風險ON（集中風險）',
      pressure_sell_dominate: '賣壓主導（買方壓力偏弱）',
      coherence_fading: '群聚退潮（同批人一致性下降）',
      price_confirmed: '價格確認（突破/TV訊號成立）',
      stability_ok: '名單穩定（同一批人延續）',
      pressure_buy: '買盤主導（壓力比偏買）',
      coherence_persist: '群聚持續（20日持久度夠）',
      neutral: '偏多偏空不明顯（建議觀察）',
      no_reasons: '無原因（尚未產生）',
    };
    return map[code] || code;
  }
  function msColor(ms){
    const c = { DISTRIBUTION:'#e74c3c', FADING:'#f39c12', ACCUMULATION:'#2ecc71', MARKUP:'#f1c40f' };
    return c[ms] || '#999';
  }

  function applyVersion(){
    var badge = document.getElementById('versionBadge');
    if (!badge) return;
    fetch('Version.txt').then(function(r){
      if (!r.ok) return null;
      return r.text();
    }).then(function(t){
      if (!t) return;
      var v = t.trim();
      if (!v) return;
      badge.textContent = '版本：' + v;
    }).catch(function(){});
  }

  function render(stock){
    const sig = stock.signals || {};
    const flags = sig.flags || buildFlags(sig);
    const ms = sig.monitor_state || 'NEUTRAL';
    const mr = sig.monitor_reasons || [];
    const c20 = sig.concentration_20d != null ? sig.concentration_20d : '-';
    const c5  = sig.concentration_5d != null ? sig.concentration_5d : '-';
    const trend = sig.trend || '觀察中';
    const scoreU = sig.score_unified != null ? sig.score_unified : (sig.score != null ? sig.score : '-');
    const geo = sig.geo_grade != null ? sig.geo_grade : '-';
    const top6 = stock.top6_details || [];
    const colorMap = {};
    (stock.whale_data || []).forEach(function(w){ colorMap[w.name]= w.color || '#888'; });

    let ledHtml = '';
    ledHtml += '<span class="led-pill ' + (flags.fb_diverge===1?'on':'off') + '"><span class="led-dot"></span>外/本分歧</span>';
    ledHtml += '<span class="led-pill ' + (flags.breadth_expand===1?'on':'off') + '"><span class="led-dot"></span>實盤擴散</span>';
    ledHtml += '<span class="led-pill ' + (flags.net_sell_dominate===1?'danger':'off') + '"><span class="led-dot"></span>淨賣主導</span>';
    ledHtml += '<span class="led-pill ' + (flags.strength_high===1?'on':'off') + '"><span class="led-dot"></span>強度高</span>';

    let statusCls = 'status-warn';
    if (stock.status && stock.status.indexOf('✅')>=0) statusCls = 'status-pass';
    else if (stock.status && stock.status.indexOf('⚠️')>=0) statusCls = 'status-warn';
    else if (stock.status && stock.status.indexOf('❌')>=0) statusCls = 'status-fail';

    let html = '<div class="col-lg-10"><div class="card shadow-lg"><div class="card-body">';
    html += '<div class="d-flex justify-content-between align-items-center mb-4">';
    html += '<div><h3 class="card-title mb-1 text-white">' + (stock.id || '') + ' ' + (stock.name || '') + '</h3>';
    html += '<span class="update-time">最後更新：' + (stock.last_update || '-') + '</span>';
    if (stock.probe_date) html += '<div class="update-time">分點參考日：' + stock.probe_date + '</div>';
    html += '</div><div class="text-end"><span class="badge bg-warning text-dark mb-1">Top 6 核心大戶監控 (10日)</span>';
    html += '<div class="' + statusCls + '">' + (stock.status || '') + '</div><div class="led-group mt-2">' + ledHtml + '</div></div></div>';

    html += '<div class="metric-card mb-4" style="text-align:left; border:1px solid #333; background:#161616;">';
    html += '<div class="metric-label">📌 大戶監測趨勢</div>';
    html += '<div style="font-size:1.55rem; font-weight:900; color:' + msColor(ms) + ';">' + msZh(ms) + '</div>';
    if (mr.length) html += '<div class="mt-2">' + mr.slice(0,6).map(function(r){ return '<span class="tag-pill">' + reasonZh(r) + '</span>'; }).join('') + '</div>';
    html += '</div>';

    html += '<div class="row mb-4"><div class="col-md-4"><div class="metric-card"><div class="metric-label">20日集中度 (%)</div><div class="metric-value">' + c20 + '%</div></div></div>';
    html += '<div class="col-md-4"><div class="metric-card"><div class="metric-label">5日集中度 (%)</div><div class="metric-value">' + c5 + '%</div></div></div>';
    html += '<div class="col-md-4"><div class="metric-card"><div class="metric-label">主力走向</div><div class="metric-value" style="font-size:1.15rem;">' + trend + '</div></div></div></div>';

    html += '<div class="row mb-4"><div class="col-md-4"><div class="metric-card"><div class="metric-label">地緣評分</div><div class="metric-value">' + geo + '</div><div class="metric-label mt-1">' + geoTagZh(sig.geo_tag || '') + '</div></div></div>';
    html += '<div class="col-md-4"><div class="metric-card"><div class="metric-label">前五分點距離加權均值(KM)</div><div class="metric-value">' + (sig.geo_top5_wavg_km != null ? sig.geo_top5_wavg_km : '-') + '</div><div class="metric-label mt-1">Z 分數：' + (sig.geo_zscore != null ? sig.geo_zscore : '-') + ' ｜ 親近度：' + (sig.geo_affinity_score != null ? sig.geo_affinity_score : '-') + '</div></div></div>';
    html += '<div class="col-md-4"><div class="metric-card"><div class="metric-label">基準 / 權重 / 調整</div><div class="metric-value" style="font-size:1rem;">' + (sig.geo_baseline_tag === "baseline_all" ? "全市場基準" : (sig.geo_baseline_tag || '-')) + '</div><div class="metric-label mt-1">權重 w=' + (sig.geo_baseline_weight != null ? sig.geo_baseline_weight : '-') + ' ｜ 調整值 adj=' + (sig.geo_adjust != null ? sig.geo_adjust : '-') + '</div></div></div></div>';

    var g5 = sig.geo_top5_detail || [];
    if (g5.length) {
      html += '<h6 class="text-info-dash mt-3 mb-2">Geo Top5 分點↔HQ</h6><div class="table-responsive mb-4"><table class="table table-dark table-hover border-secondary"><thead><tr><th>券商</th><th class="text-end">Net(張)</th><th class="text-end">KM</th></tr></thead><tbody>';
      g5.forEach(function(r){ html += '<tr><td><code>' + (r.broker_id||'') + '</code> ' + (r.broker_name||'') + '</td><td class="text-end ' + (r.net_lot>0?'buy-row':'sell-row') + '">' + (r.net_lot!= null ? r.net_lot : '-') + '</td><td class="text-end text-warning">' + (r.km_to_hq != null ? r.km_to_hq : '-') + '</td></tr>'; });
      html += '</tbody></table></div>';
    }

    var ez = sig.enhanced || {};
    var czStatus = ez.cost_zone_status || '';
    if (czStatus) {
      var czZh = czStatus === 'above_zone' ? '強勢突破' : (czStatus === 'inside_zone' ? '成本區洗盤' : '破位警戒');
      html += '<h6 class="text-info-dash mt-3 mb-2">🏷 主力成本帶</h6><div class="cost-zone-container">';
      html += '<span class="tag-pill">' + czZh + '</span>';
      html += '<span class="tag-pill">20日觸及次數: ' + (ez.cz_touch_20d != null ? ez.cz_touch_20d : '-') + '</span>';
      html += '<span class="tag-pill">突破次數: ' + (ez.cz_break_up_20d != null ? ez.cz_break_up_20d : '-') + '</span>';
      html += '<span class="tag-pill">跌破次數: ' + (ez.cz_break_dn_20d != null ? ez.cz_break_dn_20d : '-') + '</span>';
      html += '<span class="tag-pill">防守成功率: ' + (ez.cz_defense_rate_20d != null ? (ez.cz_defense_rate_20d*100).toFixed(1) + '%' : '-') + '</span>';
      var cLow = ez.cost_low, cHigh = ez.cost_high, cClose = ez.close_last;
      if (cLow != null && cHigh != null && cClose != null && cHigh > cLow){
        var minP = Math.min(cLow, cClose);
        var maxP = Math.max(cHigh, cClose);
        var span = maxP - minP;
        var lowPct = ((cLow - minP) / span) * 100;
        var highPct = ((cHigh - minP) / span) * 100;
        var closePct = ((cClose - minP) / span) * 100;
        html += '<div class="cost-bar-track">';
        html += '<div class="cost-bar-range" style="left:' + lowPct.toFixed(1) + '%;width:' + (highPct-lowPct).toFixed(1) + '%;"></div>';
        html += '<div class="cost-bar-close" style="left:' + closePct.toFixed(1) + '%;"></div>';
        html += '</div>';
        html += '<div class="cost-bar-label">成本區間：' + cLow + ' ～ ' + cHigh + ' ｜ 收盤：' + cClose + '</div>';
      } else {
        html += '<div class="mt-2" style="font-size:0.85rem; color:#cfcfcf;">成本區間 / 收盤價資料不足</div>';
      }
      html += '</div>';
    }

    html += '<h6 class="text-info-dash mt-4 mb-2">📡 TV 主力行為偵測</h6><div class="row mb-4 g-3">';
    html += '<div class="col-md-3"><div class="metric-card"><div class="metric-label">TV 綜合得分</div><div class="metric-value">' + (sig.tv_score != null ? sig.tv_score : 0) + '</div><div class="metric-label">' + (sig.tv_grade || '') + '</div></div></div>';
    html += '<div class="col-md-9"><div class="metric-card" style="text-align:left;"><div class="metric-label mb-2">五大價格訊號</div><div class="d-flex flex-wrap gap-2">';
    var tvNames = {sig_vwap:'均價偏離',sig_accumulation:'吸籌訊號',sig_rotation:'換手/輪動',sig_profile_zone:'價量重心',sig_structure_break:'結構突破'};
    ['sig_vwap','sig_accumulation','sig_rotation','sig_profile_zone','sig_structure_break'].forEach(function(k){
      var v = sig[k] != null ? sig[k] : 0;
      var on = v ? '啟動' : '未觸發';
      html += '<span class="tag-pill">' + tvNames[k] + '：<b style="color:' + (v?'#2ecc71':'#666') + '">' + on + '</b></span>';
    });
    html += '</div></div></div></div>';

    html += '<div class="row mb-4 g-3"><div class="col-md-3"><div class="metric-card"><div class="metric-label">主力得分</div><div class="metric-value">' + scoreU + '</div></div></div>';
    html += '<div class="col-md-3"><div class="metric-card"><div class="metric-label">1日 NetBuy(張)</div><div class="metric-value">' + (sig.netbuy_1d_lot != null ? sig.netbuy_1d_lot : '-') + '</div></div></div>';
    html += '<div class="col-md-3"><div class="metric-card"><div class="metric-label">5日 NetBuy(張)</div><div class="metric-value">' + (sig.netbuy_5d_lot != null ? sig.netbuy_5d_lot : '-') + '</div></div></div>';
    html += '<div class="col-md-3"><div class="metric-card"><div class="metric-label">20日 NetBuy(張)</div><div class="metric-value">' + (sig.netbuy_20d_lot != null ? sig.netbuy_20d_lot : '-') + '</div></div></div></div>';

    // 三大法人 × 融資 × 借券 Regime 卡片
    var instThree20 = Number(sig.inst_three_net_20d || 0);
    var marginFlag = Number(sig.margin_risk_flag || 0);
    var sblFlag = Number(sig.sbl_short_pressure_flag || 0);
    var bullNoShort = Number(sig.inst_bull_no_short_pressure_flag || 0);
    var bearWithShort = Number(sig.inst_bear_with_short_pressure_flag || 0);
    var regimeTag = '中性觀察';
    var regimeColor = '#9ca3af';
    if (bullNoShort === 1) {
      regimeTag = '法人偏多且無明顯空軍壓力';
      regimeColor = '#22c55e';
    } else if (bearWithShort === 1) {
      regimeTag = '法人偏空且借券壓力放大';
      regimeColor = '#f97316';
    }
    html += '<div class="row mb-4 g-3"><div class="col-md-6"><div class="metric-card" style="text-align:left;">';
    html += '<div class="metric-label">三大法人 20日合計(張)</div>';
    html += '<div class="metric-value" style="font-size:1.3rem;color:' + (instThree20>=0 ? '#22c55e' : '#f97316') + ';">' + instThree20 + '</div>';
    html += '<div class="metric-label mt-1">融資壓力: ' + (marginFlag>0 ? '偏高' : '正常') + ' | 借券壓力: ' + (sblFlag>0 ? '放大' : '正常') + '</div>';
    html += '</div></div>';
    html += '<div class="col-md-6"><div class="metric-card" style="text-align:left;">';
    html += '<div class="metric-label">三大法人 × 融資 × 借券 狀態</div>';
    html += '<div class="metric-value" style="font-size:1.25rem;color:' + regimeColor + ';">' + regimeTag + '</div>';

              x: {
                grid: { color: '#333' },
                ticks: { color: '#aaa' }
              }
            },
            plugins: {
              legend: { position: 'bottom' }
            }
          }
        });
      }
    }

    var buyList = (sig.top_buy_15 || []).slice(0, 15).sort(function(a,b){ return (b.net_lot||0) - (a.net_lot||0); });
    var sellList = (sig.top_sell_15 || []).slice(0, 15).sort(function(a,b){ return (a.net_lot||0) - (b.net_lot||0); });
    var buyLabels = buyList.map(function(r){ return (r.broker_id||'') + ' ' + (r.broker_name||''); });
    var buyVals = buyList.map(function(r){ return Math.max(0, Number(r.net_lot||0)); });
    var sellLabels = sellList.map(function(r){ return (r.broker_id||'') + ' ' + (r.broker_name||''); });
    var sellVals = sellList.map(function(r){ return Math.abs(Math.min(0, Number(r.net_lot||0))); });
    var maxAbs = Math.max(1, Math.max.apply(null, buyVals.concat(sellVals)));
    var tBuy = document.getElementById('tornadoBuyCanvas');
    var tSell = document.getElementById('tornadoSellCanvas');
    if (tBuy && buyVals.length) {
      charts.tornadoBuy = new Chart(tBuy.getContext('2d'), {
        type: 'bar',
        data: { labels: buyLabels, datasets: [{ label: '買超', data: buyVals, backgroundColor: '#84cc16', borderWidth: 0, barThickness: 14 }] },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, scales: { x: { min: 0, max: maxAbs, reverse: true, grid: { color: '#2b2b2b' }, ticks: { color: '#9a9a9a' } }, y: { position: 'left', grid: { display: false }, ticks: { color: '#d0d0d0' } } }, plugins: { legend: { display: false } } }
      });
    }
    if (tSell && sellVals.length) {
      charts.tornadoSell = new Chart(tSell.getContext('2d'), {
        type: 'bar',
        data: { labels: sellLabels, datasets: [{ label: '賣超', data: sellVals, backgroundColor: '#e06a6a', borderWidth: 0, barThickness: 14 }] },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, scales: { x: { min: 0, max: maxAbs, grid: { color: '#2b2b2b' }, ticks: { color: '#9a9a9a' } }, y: { position: 'right', grid: { display: false }, ticks: { color: '#d0d0d0' } } }, plugins: { legend: { display: false } } }
      });
    }
  }

  function buildStockInfo(raw){
    const sig = raw.signals || {};
    const scoreU = sig.final_score != null ? sig.final_score : (sig.score != null ? sig.score : 0);
    const c5 = sig.concentration_5d != null ? sig.concentration_5d : 0;
    const c20 = sig.concentration_20d != null ? sig.concentration_20d : 0;
    const trend = sig.trend || '觀察中';
    const status = '✅ 籌碼訊號已載入 | Score=' + scoreU + ' | 5D=' + c5 + '% | 20D=' + c20 + '% | ' + trend;
    return {
      id: raw.stock_id,
      name: raw.stock_name || raw.stock_id,
      status: status,
      last_update: raw.last_update || '',
      probe_date: raw.probe_date || '',
      signals: Object.assign({}, sig, { score_unified: scoreU, flags: buildFlags(sig) }),
      history_labels: raw.history_labels || [],
      whale_data: raw.whale_data || [],
      total_whale_values: raw.total_whale_values || [],
      top6_details: raw.top6_details || []
    };
  }

  function loadStock(id){
    el('loading').style.display = 'block';
    el('loading').textContent = '載入中…';
    fetch(DATA_BASE + '/' + id + '_whale_track.json')
      .then(function(r){ if (!r.ok) throw new Error('無法載入 ' + id); return r.json(); })
      .then(function(raw){
        const stock = buildStockInfo(raw);
        render(stock);
      })
      .catch(function(err){
        el('loading').innerHTML = '<div class="text-warning">⚠️ ' + err.message + '。請確認已執行 scraper 並將 data/ 推送到 GitHub。</div>';
        el('loading').style.display = 'block';
      });
  }

  function loadManifest(){
    fetch(DATA_BASE + '/manifest.json')
      .then(function(r){
        if (!r.ok) throw new Error('找不到 manifest.json');
        return r.json();
      })
      .then(function(m){
        manifest = m;
        const sel = el('stockSelect');
        const stocks = manifest.stocks && manifest.stocks.length ? manifest.stocks : (manifest.stock_ids || []).map(function(sid){ return { id: sid, name: sid }; });
        sel.innerHTML = '';
        if (stocks.length === 0){
          sel.innerHTML = '<option value="">尚無股票（請執行 scraper 並 push）</option>';
          el('loading').innerHTML = '<div class="text-muted">請在本機執行 <code>python scraper_chip.py --stock_id 6239</code> 並將 data/ 推送到 GitHub 後重新整理。</div>';
          return;
        }
        stocks.forEach(function(s){
          const o = document.createElement('option');
          o.value = s.id;
          o.textContent = s.id + ' ' + (s.name || '');
          sel.appendChild(o);
        });
        sel.addEventListener('change', function(){ loadStock(sel.value); });
        loadStock(sel.value);
      })
      .catch(function(err){
        el('stockSelect').innerHTML = '<option value="">無法載入清單</option>';
        el('loading').innerHTML = '<div class="text-warning">⚠️ ' + err.message + '。請確認倉庫中有 <code>data/manifest.json</code>（執行 scraper 會自動產生）。</div>';
      });
  }

  loadManifest();
  applyVersion();

  (function initPhase3(){
    var frame = document.getElementById('phase3Frame');
    if (!frame) return;

    function setHorizon(h){
      var src = 'data/ml_winrate_report_ret' + h + 'd.html';
      frame.src = src;
      document.querySelectorAll('[data-phase3-horizon]').forEach(function(btn){
        btn.classList.toggle('active', String(btn.getAttribute('data-phase3-horizon')) === String(h));
      });
    }

    document.querySelectorAll('[data-phase3-horizon]').forEach(function(btn){
      btn.addEventListener('click', function(){
        setHorizon(btn.getAttribute('data-phase3-horizon'));
      });
    });
  })();
})();
</script>
</body>
</html>
